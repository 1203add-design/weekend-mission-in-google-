<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>睿晨的達克比任務中心 v12.3 (防覆蓋安全同步版)</title>
    <style>
        :root {
            --duck-mascot-url: url('https://cdn-icons-png.flaticon.com/512/1046/1046391.png'); 
            --duck-badge-url: url('https://cdn-icons-png.flaticon.com/512/2908/2908305.png');
            --jungle-green: #2d6a4f;    
            --earth-yellow: #e9c46a;    
            --alert-red: #e76f51;       
            --paper-bg: #f4e9cd;        
            --ink-color: #264653;       
            --morning-bg: #ffddd2; 
            --afternoon-bg: #83c5be; 
            --evening-bg: #a8dadc; 
        }

        body { 
            font-family: 'Segoe UI', '微軟正黑體', sans-serif;
            background-color: var(--paper-bg);
            background-image: repeating-linear-gradient(45deg, rgba(0,0,0,0.02) 0px, rgba(0,0,0,0.02) 2px, transparent 2px, transparent 4px);
            background-size: 20px 20px; margin: 0; padding: 20px; padding-bottom: 130px; 
            color: var(--ink-color); user-select: none;
        }

        .container { 
            max-width: 800px; margin: 0 auto; background: rgba(255, 255, 255, 0.9); 
            padding: 25px; border-radius: 20px; box-shadow: 0 8px 20px rgba(38, 70, 83, 0.2); 
            border: 4px solid var(--jungle-green); position: relative; overflow: hidden;
        }
        
        .header-container { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; position: relative; }

        .duck-mascot {
            width: 100px; height: 100px; background-image: var(--duck-mascot-url);
            background-size: contain; background-repeat: no-repeat; background-position: center;
            margin-right: 15px; filter: drop-shadow(3px 3px 0px rgba(0,0,0,0.2)); flex-shrink: 0; 
        }
        
        .header-panel { text-align: left; flex-grow: 1; }
        .header-panel h1 { 
            margin: 0; font-size: 1.8rem; color: var(--jungle-green); 
            font-weight: 900; letter-spacing: 1px; text-shadow: 2px 2px 0px var(--earth-yellow);
        }

        .quote-box {
            height: 30px; display: flex; align-items: center;
            font-size: 0.95rem; font-weight: bold; color: var(--alert-red); margin-top: 5px;
            background: rgba(233, 196, 106, 0.2); padding: 0 15px; border-radius: 15px; width: fit-content;
        }

        .tabs-wrapper { display: flex; gap: 5px; overflow-x: auto; padding: 5px; margin-bottom: 15px; align-items: center; border-bottom: 3px solid var(--jungle-green); }
        .tab-btn {
            padding: 8px 20px; border: 2px solid var(--jungle-green); border-bottom: none; border-radius: 10px 10px 0 0;
            font-size: 1rem; font-weight: bold; cursor: pointer; background-color: #e0e0e0; color: var(--jungle-green);
            transition: all 0.2s; white-space: nowrap; margin-bottom: -3px; opacity: 0.8;
        }
        .tab-btn.active { background-color: var(--jungle-green); color: var(--earth-yellow); opacity: 1; padding-top: 12px; transform: translateY(-2px); }
        
        .add-tab-btn, .del-tab-btn { width: 30px; height: 30px; border-radius: 5px; border: 2px solid var(--jungle-green); font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 900; margin-left: 5px; }
        .add-tab-btn { background: var(--earth-yellow); color: var(--jungle-green); }
        .del-tab-btn { background: var(--alert-red); color: white; }

        .time-config { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; justify-content: center; background: rgba(255,255,255,0.5); padding: 15px; border-radius: 15px; border: 2px dashed var(--jungle-green); }
        .time-capsule { padding: 8px; border-radius: 10px; text-align: center; border: 2px solid rgba(0,0,0,0.1); transition: all 0.3s; display: flex; flex-direction: column; align-items: center; width: 85px; }
        .t-morning { background: var(--morning-bg); }
        .t-afternoon { background: var(--afternoon-bg); }
        .t-evening { background: var(--evening-bg); }
        .time-label { font-weight: 900; font-size: 0.9rem; margin-bottom: 5px; display: block; color: var(--ink-color); }
        .time-input { width: 32px; padding: 3px; text-align: center; border: 2px solid var(--ink-color); border-radius: 8px; font-weight: bold; font-size: 1rem; background: #fff; color: var(--ink-color); }
        
        .monitor-panel { margin-bottom: 25px; position: sticky; top: 0; z-index: 100; background: var(--paper-bg); padding: 15px 0; border-bottom: 4px solid var(--jungle-green); box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-left: -25px; margin-right: -25px; padding-left: 25px; padding-right: 25px; }
        .total-time-text { text-align: center; margin-bottom: 5px; font-weight: 900; color: var(--jungle-green); font-size: 0.95rem; letter-spacing: 1px; }
        
        .bar-container { height: 35px; background: #ccc; border-radius: 5px; overflow: hidden; display: flex; position: relative; border: 3px solid var(--ink-color); }
        .bar-tasks { height: 100%; background: var(--alert-red); width: 0%; transition: width 0.6s; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.9rem; white-space: nowrap; font-weight: bold; background-image: linear-gradient(45deg, rgba(0,0,0,0.1) 25%, transparent 25%, transparent 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1) 75%, transparent 75%, transparent); background-size: 20px 20px; }
        .bar-free { height: 100%; background: #2a9d8f; width: 100%; transition: width 0.6s; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; font-size: 0.9rem; }

        .mission-grid { display: grid; gap: 12px; }
        .mission-item { display: flex; align-items: center; padding: 10px 15px; background: #fff; border-radius: 5px; transition: all 0.3s; border: 2px solid var(--ink-color); box-shadow: 4px 4px 0 rgba(38, 70, 83, 0.2); position: relative; }
        .mission-item::before { content: ""; position: absolute; left: -10px; top: 50%; transform: translateY(-50%); width: 20px; height: 30px; background: var(--earth-yellow); border-radius: 10px; z-index: -1; border: 2px solid var(--ink-color); }
        .mission-item.completed { opacity: 0.7; background: #e9ecef; border-color: #adb5bd; }
        .mission-item.completed .task-name { text-decoration: line-through; color: #adb5bd; }
        .mission-item[data-color="1"] { border-left: 8px solid var(--morning-bg); }
        .mission-item[data-color="2"] { border-left: 8px solid var(--afternoon-bg); }
        .mission-item[data-color="3"] { border-left: 8px solid var(--evening-bg); }

        .check-box { width: 25px; height: 25px; margin-right: 12px; cursor: pointer; accent-color: var(--jungle-green); }
        .task-name { flex-grow: 1; font-weight: bold; font-size: 1.1rem; border:none; background: transparent; width: 100%; color: var(--ink-color); }
        .task-time-input { width: 45px; padding: 5px; text-align: center; border: 2px solid var(--ink-color); border-radius: 5px; margin-right: 8px; background: #fff; color: var(--alert-red); font-weight: bold; font-size: 1rem; }
        .period-select { padding: 5px; border-radius: 5px; border: 2px solid var(--ink-color); margin-right: 5px; cursor: pointer; font-size: 0.9rem; font-weight: bold; background: #f1f2f6; color: var(--ink-color); }
        .btn-del { margin-left: 5px; background: var(--alert-red); color: white; border: 2px solid var(--ink-color); border-radius: 5px; width: 30px; height: 30px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; box-shadow: 2px 2px 0 var(--ink-color); }
        .mission-item:hover .btn-del { opacity: 1; }

        .ep-footer { position: fixed; bottom: 0; left: 0; width: 100%; height: 90px; background: var(--jungle-green); color: white; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); display: flex; justify-content: center; align-items: center; z-index: 1000; border-top: 5px solid var(--earth-yellow); background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.1) 10px, rgba(0,0,0,0.1) 20px); }
        .footer-inner { display: flex; justify-content: center; align-items: center; gap: 30px; width: 100%; max-width: 700px; position: relative; }
        .tools-group { display: flex; gap: 10px; }
        .ep-badge-container { position: relative; width: 120px; height: 120px; display: flex; justify-content: center; align-items: center; margin-top: -40px; }
        .ep-badge-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: var(--duck-badge-url); background-size: contain; background-repeat: no-repeat; background-position: center; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); }
        .ep-score-overlay { position: relative; z-index: 2; text-align: center; color: var(--ink-color); font-weight: 900; padding-top: 15px; padding-left: 5px; }
        .ep-score { font-size: 2.2rem; line-height: 1; text-shadow: 1px 1px 0 #fff; }
        .tool-btn { background: #fff; color: var(--jungle-green); border: 3px solid var(--jungle-green); width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 1.3rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
        .tool-btn:hover { transform: translateY(-3px); background: var(--earth-yellow); }
        .add-btn { background: var(--jungle-green); color: var(--earth-yellow); border: 3px solid var(--ink-color); padding: 12px; border-radius: 10px; font-weight: 900; cursor: pointer; margin-top: 25px; width: 100%; font-size: 1.2rem; box-shadow: 5px 5px 0 var(--ink-color); transition: transform 0.1s; letter-spacing: 1px; }
        .add-btn:hover { transform: translate(-2px, -2px); background: var(--ink-color); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-container">
        <div class="duck-mascot"></div>
        <div class="header-panel">
            <h1>🦖 睿晨的達克比任務中心</h1>
            <div class="quote-box">達克比辦案，出發！</div>
        </div>
    </div>
    
    <div class="tabs-wrapper" id="tabsWrapper"></div>

    <div class="time-config">
        <div class="time-capsule t-morning">
            <span class="time-label">🌅 早上</span>
            <div class="time-inputs-row"><input type="number" class="time-input" id="t_m_h"> : <input type="number" class="time-input" id="t_m_m"></div>
        </div>
        <div class="time-capsule t-afternoon">
            <span class="time-label">☀️ 下午</span>
            <div class="time-inputs-row"><input type="number" class="time-input" id="t_a_h"> : <input type="number" class="time-input" id="t_a_m"></div>
        </div>
        <div class="time-capsule t-evening">
            <span class="time-label">🌙 晚上</span>
            <div class="time-inputs-row"><input type="number" class="time-input" id="t_e_h"> : <input type="number" class="time-input" id="t_e_m"></div>
        </div>
    </div>

    <div class="monitor-panel">
        <div class="total-time-text" id="totalTimeText">等待任務數據...</div>
        <div class="bar-container">
            <div class="bar-tasks" id="taskBar"></div>
            <div class="bar-free" id="freeBar"></div>
        </div>
    </div>

    <div id="missionContainer" class="mission-grid"></div>
    <button class="add-btn" onclick="addNewTask()">➕ 新增偵探任務 (New Case)</button>
</div>

<div class="ep-footer">
    <div class="footer-inner">
        <div class="tools-group">
            <button class="tool-btn" onclick="exportData()" title="匯出單機">📤</button>
            <button class="tool-btn" onclick="importData()" title="匯入單機">📥</button>
        </div>
        <div class="ep-badge-container">
            <div class="ep-badge-img"></div>
            <div class="ep-score-overlay"><span class="ep-label">EP能量</span><span class="ep-score" id="epScore">0</span></div>
        </div>
        <div class="tools-group">
            <button class="tool-btn btn-clear" onclick="clearCurrentDayTasks()" title="清空今日">🧹</button>
            <button class="tool-btn btn-reset" onclick="resetAllData()" title="重置雲端">↻</button>
        </div>
    </div>
</div>

<script>
    const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbwqcwJehYjK5J-kvBGnXRfaJvnv3I8Fd4Zn3UzYRXd6hQJ72dLO1rAlrhGBbmAcF6xJ5A/exec"; 
    
    let appData = { currentIdx: 0, days: [] };
    let isCloudSynced = false; // ★ 單機安全鎖：未讀到雲端前，不准上傳
    
    const defaultTaskNames = ["📘 國語預習", "📝 國語複習", "📐 奧數挑戰", "🎓 英語 Tutor", "🔥 英語 Flame", "🎹 鋼琴練習", "📚 閱讀心得", "🏃 運動時間"];
    const quotes = ["真相只有一個！", "觀察是科學的第一步。", "不要放過任何蛛絲馬跡！", "今天的實驗數據很完美。", "專注！這可是大案件。", "你的大腦正在進化中！", "保持好奇，繼續探索！", "接受挑戰，你可以的！"];

    window.onload = function() { loadData(); rotateQuotes(); };

    function fallbackToLocal() {
        const saved = localStorage.getItem('ruichen_mission_cloud');
        if (saved) {
            try {
                let parsed = JSON.parse(saved);
                if (parsed && parsed.days && parsed.days.length > 0) { appData = parsed; return; }
            } catch(e) {}
        }
        appData = { currentIdx: 0, days: [] };
        createDayData("第 1 天");
    }

    function loadData() {
        document.getElementById('totalTimeText').innerText = "📡 正在連線至指揮中心雲端基地...";
        
        // ★ 使用 JSONP 穿透技術，100% 繞過跨域與瀏覽器防護
        const script = document.createElement('script');
        const callbackName = 'jsonpCallback_' + Math.round(100000 * Math.random());
        
        window[callbackName] = function(cloudData) {
            delete window[callbackName];
            document.body.removeChild(script);
            
            if (cloudData && cloudData.days && cloudData.days.length > 0) {
                appData = cloudData;
                isCloudSynced = true; // 讀取成功，解鎖上傳
            } else {
                fallbackToLocal();
                isCloudSynced = true; // 雲端是空的，也算連線成功，允許上傳
            }
            renderAll();
        };

        script.onerror = function() {
            delete window[callbackName];
            document.body.removeChild(script);
            isCloudSynced = false; // 讀取失敗，觸發安全鎖
            alert("⚠️ 雲端連線失敗！已切換為「單機安全模式」。\n為避免覆蓋其他設備紀錄，您的修改【不會】上傳到雲端。");
            fallbackToLocal();
            renderAll();
        };

        script.src = CLOUD_API_URL + "?callback=" + callbackName + "&t=" + new Date().getTime();
        document.body.appendChild(script);
    }

    function saveAll() {
        localStorage.setItem('ruichen_mission_cloud', JSON.stringify(appData));
        
        // ★ 安全鎖：確保有成功從雲端抓過資料，才允許把資料蓋上去
        if (isCloudSynced) {
            fetch(CLOUD_API_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(appData)
            }).catch(e => console.error(e));
        } else {
            console.warn("未連線至雲端，暫停上傳以防覆蓋。");
        }
    }

    function renderAll() { renderTabs(); renderCurrentDay(); setupInputs(); }

    function createDayData(name) {
        appData.days.push({ name: name, time: [0,0,0,0,0,0], tasks: defaultTaskNames.map(n => ({ name: n, checked: false, period: '99', time: '' })), ep: 0 });
    }

    function capture() {
        if(appData.days.length === 0) return;
        const currentDayObj = appData.days[appData.currentIdx];
        const tInps = document.querySelectorAll('.time-input');
        let tArr = []; tInps.forEach(inp => tArr.push(parseInt(inp.value)||0));
        currentDayObj.time = tArr;
        
        const container = document.getElementById('missionContainer');
        let tTasks = [];
        Array.from(container.children).forEach(div => {
            tTasks.push({
                name: div.querySelector('.task-name').value, 
                checked: div.querySelector('.check-box').checked,
                period: div.querySelector('.period-select').value, 
                time: div.querySelector('.task-time-input').value
            });
        });
        currentDayObj.tasks = tTasks;
        saveAll();
    }

    function renderTabs() {
        const wrapper = document.getElementById('tabsWrapper');
        wrapper.innerHTML = `<button class="add-tab-btn" onclick="addNewDayTab()">+</button>`;
        appData.days.forEach((day, idx) => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${idx === appData.currentIdx ? 'active' : ''}`;
            btn.innerText = day.name;
            btn.onclick = () => { capture(); appData.currentIdx = idx; renderAll(); };
            btn.ondblclick = () => { const newName = prompt("幫這一天改名：", day.name); if(newName) { day.name = newName; capture(); renderAll(); } };
            wrapper.appendChild(btn);
        });
    }

    function renderCurrentDay() {
        if(appData.days.length === 0) return;
        const data = appData.days[appData.currentIdx];
        
        const tInps = document.querySelectorAll('.time-input');
        data.time.forEach((val, i) => tInps[i].value = val === 0 ? '' : val);
        
        const container = document.getElementById('missionContainer');
        container.innerHTML = '';
        data.tasks.sort((a,b) => parseInt(a.period) - parseInt(b.period));
        
        let ep = 0;
        data.tasks.forEach((task, i) => {
            if(task.checked) ep += 5;
            const div = document.createElement('div');
            div.className = `mission-item ${task.checked ? 'completed' : ''}`;
            div.setAttribute('data-color', task.period);
            div.innerHTML = `
                <input type="checkbox" class="check-box" ${task.checked ? 'checked' : ''} onchange="toggleCheck(${i})">
                <input type="text" class="task-name" value="${task.name}" placeholder="輸入任務..." onchange="capture()">
                <input type="number" class="task-time-input" value="${task.time}" placeholder="分" onchange="capture()">
                <select class="period-select" onchange="capture(); renderCurrentDay();">
                    <option value="99" ${task.period==99?'selected':''}>時段?</option>
                    <option value="1" ${task.period==1?'selected':''}>早上</option>
                    <option value="2" ${task.period==2?'selected':''}>下午</option>
                    <option value="3" ${task.period==3?'selected':''}>晚上</option>
                </select>
                <button class="btn-del" onclick="delTask(${i})">x</button>
            `;
            container.appendChild(div);
        });
        document.getElementById('epScore').innerText = ep;
        calculateTime();
    }

    function toggleCheck(i) { appData.days[appData.currentIdx].tasks[i].checked = !appData.days[appData.currentIdx].tasks[i].checked; if(appData.days[appData.currentIdx].tasks[i].checked) triggerFlash(); capture(); renderCurrentDay(); }
    function delTask(i) { if(confirm("確定刪除此任務？")) { appData.days[appData.currentIdx].tasks.splice(i, 1); capture(); renderCurrentDay(); } }
    function addNewTask() { capture(); appData.days[appData.currentIdx].tasks.push({name: "", checked: false, period: '99', time: ""}); renderCurrentDay(); }
    function addNewDayTab() { capture(); createDayData(`第 ${appData.days.length + 1} 天`); appData.currentIdx = appData.days.length - 1; saveAll(); renderAll(); }
    function deleteCurrentDayTab() { if(appData.days.length > 1 && confirm("確定要刪除嗎？")) { appData.days.splice(appData.currentIdx, 1); appData.currentIdx = 0; saveAll(); renderAll(); } else if (appData.days.length <= 1) { alert("不能再刪除了！"); } }
    function clearCurrentDayTasks() { if(confirm("確定清空今日任務嗎？")) { appData.days[appData.currentIdx].tasks = []; saveAll(); renderCurrentDay(); } }
    
    function resetAllData() { 
        if(confirm("確定要重置所有資料嗎？雲端資料也會同步清空！")) { 
            appData = { currentIdx: 0, days: [] }; createDayData("第 1 天");
            isCloudSynced = true; // 強制解鎖上傳權限
            saveAll(); renderAll(); alert("✅ 資料已完全重置並上傳雲端！");
        } 
    }

    function setupInputs() { document.querySelectorAll('.time-input').forEach(inp => { inp.addEventListener('change', capture); }); }
    
    function calculateTime() {
        const tInps = document.querySelectorAll('.time-input');
        let totalMin = 0;
        for(let i=0; i<6; i+=2) totalMin += (parseInt(tInps[i].value)||0)*60 + (parseInt(tInps[i+1].value)||0);
        let usedMin = 0;
        document.querySelectorAll('.task-time-input').forEach(input => { usedMin += parseInt(input.value) || 0; });
        let freeMin = totalMin - usedMin;

        document.getElementById('totalTimeText').innerText = totalMin > 0 ? `總行動時間：${Math.floor(totalMin/60)}小時 ${totalMin%60}分` : "請輸入時間膠囊數據...";
        let usedPct = totalMin > 0 ? Math.min((usedMin / totalMin) * 100, 100) : 0;
        
        document.getElementById('taskBar').style.width = `${usedPct}%`;
        document.getElementById('taskBar').innerText = usedPct > 5 ? `${Math.floor(usedMin/60)===0?usedMin+'分':Math.floor(usedMin/60)+'時'+usedMin%60+'分'}` : '';
        document.getElementById('freeBar').style.width = `${100 - usedPct}%`;
        
        if(freeMin < 0) {
            document.getElementById('freeBar').innerText = `⚠️ 透支: ${Math.abs(Math.floor(freeMin/60))}時${Math.abs(freeMin%60)}分`;
            document.getElementById('freeBar').style.background = "#636e72";
        } else {
            document.getElementById('freeBar').innerText = freeMin >= 0 ? `🌿 自由: ${Math.floor(freeMin/60)===0?freeMin+'分':Math.floor(freeMin/60)+'時'+freeMin%60+'分'}` : '';
            document.getElementById('freeBar').style.background = "#2a9d8f";
        }
    }

    function triggerFlash() { const badge = document.getElementById('epBadge'); badge.classList.remove('flash-active'); void badge.offsetWidth; badge.classList.add('flash-active'); }
    let qIdx = 0; function rotateQuotes() { const el = document.getElementById('quoteText'); el.innerText = quotes[qIdx]; qIdx = (qIdx + 1) % quotes.length; setTimeout(rotateQuotes, 10000); }

    function exportData() { capture(); prompt("請手動複製這串代碼：", btoa(encodeURIComponent(JSON.stringify(appData)))); }
    function importData() { const input = prompt("請貼上「設定代碼」："); if(input) { try { appData = JSON.parse(decodeURIComponent(atob(input))); saveAll(); renderAll(); } catch (e) { alert("❌ 代碼錯誤！"); } } }
</script>
</body>
</html>
